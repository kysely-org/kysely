packages:
  - './site'
  - './test/cloudflare-workers'

# Allow (true) or disallow (false) script execution.
# https://pnpm.io/settings#allowbuilds
allowBuilds:
  better-sqlite3@12.8.0: true
  core-js: false # site dependency, useless scripts
  core-js-pure: false # site dependency, useless scripts
  esbuild@0.28.0: true
  sharp: false # wrangler dependency, useless scripts
  workerd@1.20260405.1: true # wrangler@4.81.0 dependency

# All transitive dependencies must be resolved from a trusted source.
# Packages from trusted sources are considered safer, as they are typically subject
# to more reliable verification and scanning for malware and vulnerabilities.
# https://pnpm.io/settings#blockexoticsubdeps
blockExoticSubdeps: true

# Deduplicate peer dependencies.
# see: https://github.com/pnpm/pnpm/issues/11070
dedupePeers: true

# Deny package installs that don't match the supported Node.js version/s.
# https://pnpm.io/settings#enginestrict
engineStrict: true

# The minimum number of minutes that must pass after a version is published before
# pnpm will install it.
# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 1440 # 1 day old in minutes.

# Make repeat `pnpm install`s much faster by performing a cheap check before.
# https://pnpm.io/settings#optimisticrepeatinstall
optimisticRepeatInstall: true

# Fail when a dependency tries running a script and it is not in `allowBuilds`.
# https://pnpm.io/settings#strictdepbuilds
strictDepBuilds: true

# Fail if a package's trust level has decreased compared to previous releases.
# https://pnpm.io/settings#trustpolicy
trustPolicy: no-downgrade

# A list of package selectors that should be excluded from the trust policy check.
# https://pnpm.io/settings#trustpolicyexclude
trustPolicyExclude:
  - semver@5.7.2 || 6.3.1 # tsd@0.20.0 || @docusaurus/core@3.10.0 - https://socket.dev/npm/package/semver/overview/5.7.2 || https://socket.dev/npm/package/semver/overview/6.3.1

# Fail before running custom scripts if `node_modules` is out of date.
# https://pnpm.io/settings#verifydepsbeforerun
verifyDepsBeforeRun: error
