name: preview

permissions: {}

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - '**/*'
      - '!.github/workflows/*.yml'
      - '.github/workflows/preview.yml'
      - '!assets/**'
      - '!docs/**'
      - '!example/**'
      - '!site/**'
      - '!test/**'
      - '!.node-version'
      - '!.nvmrc'
      - '!.prettierignore'
      - '!.prettierrc.json'
      - '!*.md'
      - '!deno.check*'
      - '!deno.lint.json'
      - '!docker-compose.yml'
      - '!jsr.json'
      - '!LICENSE'

jobs:
  release:
    concurrency:
      cancel-in-progress: ${{ github.ref_name != 'master' }}
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}

    name: Release preview build
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: false # cache can be poisoned by malicious actors.

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          package-manager-cache: false # cache can be poisoned by malicious actors.
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm with latest-10 install

      - name: Build
        run: pnpm with latest-10 build

      - name: Release preview version
        run: pnpm with latest-10 dlx pkg-pr-new@0.0.71 publish --template './example'
